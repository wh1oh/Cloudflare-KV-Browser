name = "kv-manager"
main = "_worker.js"
compatibility_date = "2024-01-01"

# ── 环境变量（明文，非敏感） ──────────────────────────────────────────────────
[vars]
USER = "admin"

# ── 业务 KV 命名空间（存你的文件，可以多个） ──────────────────────────────────
# 1. 先创建：wrangler kv:namespace create MY_FILES
# 2. 把生成的 id 填到下面，binding 名字随意
# [[kv_namespaces]]
# binding = "MY_FILES"
# id = "请填入你的 KV namespace ID"

# ── 敏感变量（不要写在这里，用 secret） ──────────────────────────────────────
# 部署前在终端执行：
#   wrangler secret put PASSWORD      # 登录密码
#   wrangler secret put SECRET_KEY    # 签名密钥，建议用随机字符串：openssl rand -hex 32
